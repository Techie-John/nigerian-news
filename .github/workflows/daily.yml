name: Yaarn Daily Nigerian News

on:
  schedule:
    - cron: "0 18 * * *"   # 18:00 UTC = 7:00 PM WAT
  workflow_dispatch:        # allows manual trigger from Actions tab

permissions:
  contents: write          # needed to commit story_memory.json back

jobs:
  build-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-liberation fonts-dejavu-core fonts-freefont-ttf

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Yaarn pipeline
        env:
          GROQ_API_KEY:              ${{ secrets.GROQ_API_KEY }}
          KOKORO_API_URL:            ${{ secrets.KOKORO_API_URL }}
          KOKORO_API_KEY:            ${{ secrets.KOKORO_API_KEY }}
          FACEBOOK_PAGE_ID:          ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID:      ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          TELEGRAM_BOT_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:          ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Upload run output (video, script, audio)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yaarn-output-${{ github.run_id }}
          path: output/
          retention-days: 7

      - name: Commit updated story memory
        if: always()
        run: |
          git config user.name "yaarn-bot"
          git config user.email "yaarn-bot@users.noreply.github.com"
          git add story_memory.json
          git diff --staged --quiet || git commit -m "Update story memory [skip ci]"
          git push